<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>CatchUp</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>

    <!-- SCREEN 1: Type your subject -->
    <div class="container" id="screen1">
      <h1>CatchUp</h1>
      <p>What subject are you struggling with?</p>
      <input type="text" id="subject-input" placeholder="e.g. Chemistry, Algebra, Economics..." />
      <button class="main-btn" onclick="submitSubject()">Continue</button>
    </div>

    <!-- SCREEN 2: Pick where you got lost -->
    <div class="container hidden" id="screen2">
      <h1 id="screen2-title"></h1>
      <p>Where did things stop making sense?</p>
      <div class="topics" id="topics-list"></div>
      <button class="back-btn" onclick="goBack()">← Back</button>
    </div>

    <!-- SCREEN 3: Catch-up plan -->
    <div class="container hidden" id="screen3">
      <h1>Your Catch-Up Plan</h1>
      <div id="plan-output"></div>
      <button class="back-btn" onclick="goBack2()">← Try another topic</button>
      <button class="main-btn" onclick="restart()">Start Over</button>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
